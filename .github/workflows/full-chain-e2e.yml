name: Full-Chain E2E

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout zero-chain
        uses: actions/checkout@v4
        with:
          path: zero-chain

      - name: Checkout zero-mining-stack
        uses: actions/checkout@v4
        with:
          repository: zero-chain-devs/zero-mining-stack
          path: zero-mining-stack

      - name: Checkout zero-explore
        uses: actions/checkout@v4
        with:
          repository: zero-chain-devs/zero-explore
          path: zero-explore

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            zero-chain -> target
            zero-mining-stack -> target
            zero-explore/backend -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: zero-explore/frontend/package-lock.json

      - name: Run full-chain E2E
        working-directory: zero-chain
        env:
          MINING_STACK_DIR: ${{ github.workspace }}/zero-mining-stack
          EXPLORER_DIR: ${{ github.workspace }}/zero-explore
        run: bash scripts/full_chain_e2e.sh

      - name: Upload full-chain report and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-chain-e2e
          path: |
            zero-chain/artifacts/release-gate/full-chain-e2e-report.md
            zero-chain/artifacts/full-chain-e2e-logs
